<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="csGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="940" height="420" rx="12" fill="#0f172a"/>
  <text x="470" y="28" text-anchor="middle" fill="#94a3b8" font-size="11">MCP CUSTOMER SERVICE — CONVERSATIONS, INTELLIGENCE &amp; RESOLUTION</text>

  <!-- Customers -->
  <rect x="20" y="80" width="130" height="200" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="100" text-anchor="middle" fill="#94a3b8" font-size="10">CUSTOMERS</text>
  <rect x="30" y="112" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="126" text-anchor="middle" fill="#f1f5f9" font-size="9">💬 Chat</text>
  <rect x="30" y="137" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="151" text-anchor="middle" fill="#f1f5f9" font-size="9">📧 Email</text>
  <rect x="30" y="162" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="176" text-anchor="middle" fill="#f1f5f9" font-size="9">📞 Phone</text>
  <rect x="30" y="187" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="201" text-anchor="middle" fill="#f1f5f9" font-size="9">🌐 Social</text>

  <line x1="150" y1="180" x2="200" y2="180" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="200,175 210,180 200,185" fill="#38bdf8"/>

  <!-- Server -->
  <rect x="210" y="45" width="340" height="340" rx="8" fill="url(#csGrad)" opacity="0.08" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="380" y="67" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="bold">mcp-customer-service</text>
  <text x="380" y="83" text-anchor="middle" fill="#64748b" font-size="9">Rust · rmcp 1.7 · 20 tools</text>

  <rect x="222" y="95" width="155" height="60" rx="4" fill="#1e293b"/>
  <text x="299" y="111" text-anchor="middle" fill="#38bdf8" font-size="9">CONVERSATIONS (5)</text>
  <text x="299" y="126" text-anchor="middle" fill="#64748b" font-size="8">list · get · start</text>
  <text x="299" y="138" text-anchor="middle" fill="#64748b" font-size="8">reply · internal note</text>

  <rect x="383" y="95" width="155" height="60" rx="4" fill="#1e293b"/>
  <text x="460" y="111" text-anchor="middle" fill="#fbbf24" font-size="9">INTELLIGENCE (4)</text>
  <text x="460" y="126" text-anchor="middle" fill="#64748b" font-size="8">profile · health · history</text>
  <text x="460" y="138" text-anchor="middle" fill="#64748b" font-size="8">churn risk assessment</text>

  <rect x="222" y="165" width="155" height="60" rx="4" fill="#1e293b"/>
  <text x="299" y="181" text-anchor="middle" fill="#34d399" font-size="9">RESOLUTION (4)</text>
  <text x="299" y="196" text-anchor="middle" fill="#64748b" font-size="8">search KB · suggest response</text>
  <text x="299" y="208" text-anchor="middle" fill="#64748b" font-size="8">canned responses · resolve</text>

  <rect x="383" y="165" width="155" height="60" rx="4" fill="#1e293b"/>
  <text x="460" y="181" text-anchor="middle" fill="#a78bfa" font-size="9">ROUTING (3)</text>
  <text x="460" y="196" text-anchor="middle" fill="#64748b" font-size="8">assign · escalate</text>
  <text x="460" y="208" text-anchor="middle" fill="#64748b" font-size="8">queue status</text>

  <rect x="222" y="235" width="155" height="50" rx="4" fill="#1e293b"/>
  <text x="299" y="251" text-anchor="middle" fill="#fb923c" font-size="9">METRICS (2)</text>
  <text x="299" y="266" text-anchor="middle" fill="#64748b" font-size="8">CSAT · NPS · FCR</text>

  <rect x="383" y="235" width="155" height="50" rx="4" fill="#1e293b"/>
  <text x="460" y="251" text-anchor="middle" fill="#f87171" font-size="9">MANAGEMENT (2)</text>
  <text x="460" y="266" text-anchor="middle" fill="#64748b" font-size="8">agents · merge</text>

  <rect x="222" y="295" width="316" height="24" rx="4" fill="#1e293b"/>
  <text x="380" y="311" text-anchor="middle" fill="#94a3b8" font-size="9">Seeded: 5 customers · 5 conversations · 5 KB articles · 5 canned responses</text>

  <!-- AI Agent -->
  <rect x="590" y="80" width="310" height="260" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="745" y="105" text-anchor="middle" fill="#94a3b8" font-size="10">AI AGENT WORKFLOW</text>

  <rect x="610" y="118" width="270" height="22" rx="3" fill="#334155"/>
  <text x="745" y="133" text-anchor="middle" fill="#38bdf8" font-size="9">1. Triage → classify priority &amp; category</text>
  <rect x="610" y="146" width="270" height="22" rx="3" fill="#334155"/>
  <text x="745" y="161" text-anchor="middle" fill="#fbbf24" font-size="9">2. Understand → customer health &amp; history</text>
  <rect x="610" y="174" width="270" height="22" rx="3" fill="#334155"/>
  <text x="745" y="189" text-anchor="middle" fill="#34d399" font-size="9">3. Resolve → KB search + suggest response</text>
  <rect x="610" y="202" width="270" height="22" rx="3" fill="#334155"/>
  <text x="745" y="217" text-anchor="middle" fill="#a78bfa" font-size="9">4. Respond → reply or escalate to human</text>
  <rect x="610" y="230" width="270" height="22" rx="3" fill="#334155"/>
  <text x="745" y="245" text-anchor="middle" fill="#fb923c" font-size="9">5. Close → resolve + CSAT survey</text>

  <rect x="610" y="265" width="270" height="55" rx="4" fill="#0f172a" stroke="#475569"/>
  <text x="745" y="283" text-anchor="middle" fill="#94a3b8" font-size="8">GOVERNANCE</text>
  <text x="745" y="297" text-anchor="middle" fill="#64748b" font-size="8">reply_conversation = external_write (customer-facing)</text>
  <text x="745" y="310" text-anchor="middle" fill="#64748b" font-size="8">escalate = requires reason · merge = destructive</text>

  <text x="470" y="405" text-anchor="middle" fill="#475569" font-size="10">mcp-customer-service v1.0.0 · 20 tools · Customer Intelligence · Churn Prediction · CSAT/NPS</text>
</svg>
