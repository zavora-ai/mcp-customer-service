<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <defs>
    <linearGradient id="csGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="440" rx="12" fill="#0f172a"/>
  <text x="480" y="28" text-anchor="middle" fill="#94a3b8" font-size="11">MCP CUSTOMER SERVICE — MULTI-BACKEND ARCHITECTURE</text>

  <!-- Clients -->
  <rect x="20" y="100" width="130" height="200" rx="8" fill="#1e293b" stroke="#475569"/>
  <text x="85" y="120" text-anchor="middle" fill="#94a3b8" font-size="10">MCP CLIENTS</text>
  <rect x="30" y="135" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="149" text-anchor="middle" fill="#f1f5f9" font-size="9">Claude / Kiro</text>
  <rect x="30" y="160" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="174" text-anchor="middle" fill="#f1f5f9" font-size="9">Cursor / Codex</text>
  <rect x="30" y="185" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="199" text-anchor="middle" fill="#f1f5f9" font-size="9">Windsurf</text>
  <rect x="30" y="210" width="110" height="20" rx="3" fill="#334155"/>
  <text x="85" y="224" text-anchor="middle" fill="#f1f5f9" font-size="9">Any MCP Client</text>

  <line x1="150" y1="200" x2="195" y2="200" stroke="#6366f1" stroke-width="2"/>
  <polygon points="195,195 205,200 195,205" fill="#6366f1"/>
  <text x="172" y="190" text-anchor="middle" fill="#6366f1" font-size="9">stdio</text>

  <!-- Server -->
  <rect x="205" y="50" width="340" height="360" rx="8" fill="url(#csGrad)" opacity="0.08" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="375" y="72" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="bold">mcp-customer-service</text>
  <text x="375" y="88" text-anchor="middle" fill="#64748b" font-size="9">Rust · rmcp 1.7 · 20 tools · Multi-backend</text>

  <rect x="217" y="100" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="294" y="116" text-anchor="middle" fill="#38bdf8" font-size="9">CONVERSATIONS (5)</text>
  <text x="294" y="131" text-anchor="middle" fill="#64748b" font-size="8">list · get · start</text>
  <text x="294" y="143" text-anchor="middle" fill="#64748b" font-size="8">reply · internal note</text>

  <rect x="378" y="100" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="455" y="116" text-anchor="middle" fill="#fbbf24" font-size="9">INTELLIGENCE (4)</text>
  <text x="455" y="131" text-anchor="middle" fill="#64748b" font-size="8">profile · health · history</text>
  <text x="455" y="143" text-anchor="middle" fill="#64748b" font-size="8">churn risk</text>

  <rect x="217" y="163" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="294" y="179" text-anchor="middle" fill="#34d399" font-size="9">RESOLUTION (4)</text>
  <text x="294" y="194" text-anchor="middle" fill="#64748b" font-size="8">KB search · suggest</text>
  <text x="294" y="206" text-anchor="middle" fill="#64748b" font-size="8">canned responses · resolve</text>

  <rect x="378" y="163" width="155" height="55" rx="4" fill="#1e293b"/>
  <text x="455" y="179" text-anchor="middle" fill="#a78bfa" font-size="9">ROUTING (3)</text>
  <text x="455" y="194" text-anchor="middle" fill="#64748b" font-size="8">assign · escalate</text>
  <text x="455" y="206" text-anchor="middle" fill="#64748b" font-size="8">queue status</text>

  <rect x="217" y="226" width="155" height="45" rx="4" fill="#1e293b"/>
  <text x="294" y="242" text-anchor="middle" fill="#fb923c" font-size="9">METRICS (2)</text>
  <text x="294" y="257" text-anchor="middle" fill="#64748b" font-size="8">CSAT/NPS · service</text>

  <rect x="378" y="226" width="155" height="45" rx="4" fill="#1e293b"/>
  <text x="455" y="242" text-anchor="middle" fill="#f87171" font-size="9">MANAGEMENT (2)</text>
  <text x="455" y="257" text-anchor="middle" fill="#64748b" font-size="8">agents · merge</text>

  <!-- Backend dispatcher -->
  <rect x="217" y="280" width="316" height="35" rx="4" fill="#1e293b" stroke="#38bdf8" stroke-width="0.5"/>
  <text x="375" y="301" text-anchor="middle" fill="#38bdf8" font-size="9">BACKEND DISPATCHER — auto-detect from env vars</text>

  <!-- Arrow to backends -->
  <line x1="545" y1="200" x2="600" y2="140" stroke="#38bdf8" stroke-width="1.5"/>
  <line x1="545" y1="200" x2="600" y2="200" stroke="#34d399" stroke-width="1.5"/>
  <line x1="545" y1="200" x2="600" y2="260" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="545" y1="200" x2="600" y2="320" stroke="#fb923c" stroke-width="1.5"/>

  <!-- Backends -->
  <rect x="600" y="110" width="310" height="55" rx="6" fill="#1e293b" stroke="#38bdf8"/>
  <text x="755" y="130" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="bold">Zendesk</text>
  <text x="755" y="145" text-anchor="middle" fill="#64748b" font-size="8">ZENDESK_SUBDOMAIN + ZENDESK_EMAIL + ZENDESK_API_TOKEN</text>
  <text x="755" y="157" text-anchor="middle" fill="#475569" font-size="7">Tickets, Users, Macros, Help Center, Satisfaction Ratings</text>

  <rect x="600" y="173" width="310" height="55" rx="6" fill="#1e293b" stroke="#34d399"/>
  <text x="755" y="193" text-anchor="middle" fill="#34d399" font-size="10" font-weight="bold">Freshdesk</text>
  <text x="755" y="208" text-anchor="middle" fill="#64748b" font-size="8">FRESHDESK_DOMAIN + FRESHDESK_API_KEY</text>
  <text x="755" y="220" text-anchor="middle" fill="#475569" font-size="7">Tickets, Contacts, Agents, Solutions, Canned Responses</text>

  <rect x="600" y="236" width="310" height="55" rx="6" fill="#1e293b" stroke="#a78bfa"/>
  <text x="755" y="256" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="bold">Intercom</text>
  <text x="755" y="271" text-anchor="middle" fill="#64748b" font-size="8">INTERCOM_ACCESS_TOKEN</text>
  <text x="755" y="283" text-anchor="middle" fill="#475569" font-size="7">Conversations, Contacts, Admins, Help Center, Notes</text>

  <rect x="600" y="299" width="310" height="55" rx="6" fill="#1e293b" stroke="#fb923c"/>
  <text x="755" y="319" text-anchor="middle" fill="#fb923c" font-size="10" font-weight="bold">Custom API</text>
  <text x="755" y="334" text-anchor="middle" fill="#64748b" font-size="8">CUSTOMER_SERVICE_API_URL + CUSTOMER_SERVICE_API_KEY</text>
  <text x="755" y="346" text-anchor="middle" fill="#475569" font-size="7">Your own backend implementing the API spec (docs/api-spec.md)</text>

  <!-- Footer -->
  <text x="480" y="420" text-anchor="middle" fill="#475569" font-size="10">mcp-customer-service v2.1.0 · 20 tools · 4 backends · No data stored · Pure API passthrough</text>
</svg>
